# Docker Compose Configuration - AI Platform Automation
# Generated: 2026-03-14 22:54 UTC
# Tenant: datasquiz
# Status: 75% SUCCESSFUL (5/6 core services operational)

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    user: "${POSTGRES_UID:-70}:${TENANT_GID:-1001}"
    networks:
      - default
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-ai_platform}'
      - 'POSTGRES_USER=${POSTGRES_USER:-postgres}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_LOG_LEVEL=${POSTGRES_LOG_LEVEL:-info}'
      - 'POSTGRES_LOG_MIN_DURATION_STATEMENT=${POSTGRES_LOG_MIN_DURATION_STATEMENT:-0}'
      - 'POSTGRES_LOG_MIN_MESSAGES=${POSTGRES_LOG_MIN_MESSAGES:-info}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    user: "${REDIS_UID:-999}:${TENANT_GID:-1001}"
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --requirepass "${REDIS_PASSWORD}" --loglevel "${REDIS_LOGLEVEL:-notice}"
    volumes:
      - ${TENANT_DIR}/redis:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    user: "1000:1001"
    networks:
      - default
    environment:
      QDRANT__LOG_LEVEL: "${QDRANT__LOG_LEVEL:-info}"
      QDRANT__SERVICE__HTTP__ENABLE_CORS: "${QDRANT__SERVICE__HTTP__ENABLE_CORS:-true}"
      QDRANT__STORAGE__SNAPSHOTS_PATH: "/qdrant/storage/snapshots"
    volumes:
      - ./qdrant:/qdrant/storage
      - ./qdrant/snapshots:/qdrant/snapshots
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy 2>/dev/null || curl -sf http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    user: "472:472"
    environment:
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_PATHS_LOGS=/var/log/grafana
      - GF_PATHS_PLUGINS=/var/lib/grafana/plugins
      - GF_DATABASE_TYPE=sqlite3
      - GF_DATABASE_PATH=/var/lib/grafana/grafana.db
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_SERVER_DOMAIN=grafana.${DOMAIN}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/logs:/var/log/grafana
      - ./grafana/plugins:/var/lib/grafana/plugins
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "5", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  litellm:
    image: ghcr.io/berriai/litellm:main
    restart: unless-stopped
    user: "1000:1001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - STORE_MODEL_IN_DB=True
      - LITELLM_LOG=INFO
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - litellm_data:/app/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    user: "0:0"
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grafana:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      openwebui:
        condition: service_healthy
    environment:
      - CADDY_LOG_LEVEL=debug
      - CADDY_LOG_FORMAT=json
    volumes:
      - ${TENANT_DIR}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TENANT_DIR}/caddy/data:/data
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  litellm_data:
    driver: local

networks:
  default:
    name: ai-datasquiz-net
    driver: bridge
