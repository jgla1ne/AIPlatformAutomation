# Docker Compose Configuration
# AI Platform - Complete Service Stack

networks:
  net_internal:
    driver: bridge
  net_default:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  n8n-data:
  flowise-data:
  anythingllm-data:
  ollama-data:
  dify-api-data:
  dify-storage-data:
  signal-data:
  litellm-data:
  grafana-data:
  prometheus-data:
  openclaw-data:
  tailscale-data:
  open-webui-data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${DATA_ROOT}/logs/postgres:/var/log/postgresql
    networks:
      - net_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
      - ${DATA_ROOT}/logs/redis:/var/log/redis
    networks:
      - net_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME}-ollama
    restart: unless-stopped
    
    networks:
      - net_internal
      - net_default
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama-data:/root/.ollama
      - ${DATA_ROOT}/logs/ollama:/var/log/ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ${COMPOSE_PROJECT_NAME}-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aiplatform}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORE_MODEL_IN_DB: "True"
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/config/litellm:/app/config
      - ${DATA_ROOT}/logs/litellm:/app/logs
    networks:
      - net_internal
      - net_default
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    command: ["--config", "/app/config/config.yaml", "--port", "4000", "--num_workers", "4"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=litellm"
      - "ai-platform.type=llm-gateway"

  dify-api:
    image: langgenius/dify-api:latest
    container_name: ${COMPOSE_PROJECT_NAME}-dify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${COMPOSE_PROJECT_NAME}-postgres
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: ${COMPOSE_PROJECT_NAME}-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
    volumes:
      - dify-storage-data:/app/api/storage
    networks:
      - net_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  dify-web:
    image: langgenius/dify-web:latest
    container_name: ${COMPOSE_PROJECT_NAME}-dify-web
    restart: unless-stopped
    depends_on:
      dify-api:
        condition: service_healthy
    environment:
      CONSOLE_API_URL: http://dify-api:5001
      APP_API_URL: http://dify-api:5001
    networks:
      - net_default
    ports:
      - "${DIFY_WEB_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dify-worker:
    image: langgenius/dify-api:latest
    container_name: ${COMPOSE_PROJECT_NAME}-dify-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery.app worker --loglevel=info
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/dify/storage:/app/storage
      - ${DATA_ROOT}/logs/dify:/app/logs
    networks:
      - net_internal
      - net_default
    labels:
      - "ai-platform.service=dify-worker"
      - "ai-platform.type=ai-platform"

  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    container_name: ${COMPOSE_PROJECT_NAME}-dify-sandbox
    restart: unless-stopped
    environment:
      API_BASE_URL: http://dify-api:5001
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "1"
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/dify/sandbox:/var/sandbox
    networks:
      - net_internal
      - net_default
    labels:
      - "ai-platform.service=dify-sandbox"
      - "ai-platform.type=ai-platform"

  n8n:
    image: n8nio/n8n:latest
    container_name: ${COMPOSE_PROJECT_NAME}-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${COMPOSE_PROJECT_NAME}-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - net_internal
      - net_default
    ports:
      - "${N8N_PORT:-5678}:5678"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s

  flowise:
    image: flowiseai/flowise:latest
    container_name: ${COMPOSE_PROJECT_NAME}-flowise
    restart: unless-stopped
    environment:
      DATABASE_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: flowise
      FLOWISE_USERNAME: admin
      FLOWISE_PASSWORD: ${ADMIN_PASSWORD}
      SECRETKEY_OVERWRITE: ${ENCRYPTION_KEY}
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
      VECTOR_DB: ${VECTOR_DB_TYPE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ${DATA_ROOT}/flowise:/root/.flowise
      - ${DATA_ROOT}/logs/flowise:/var/log/flowise
    networks:
      - net_internal
      - net_default
    ports:
      - "${FLOWISE_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=flowise"
      - "ai-platform.type=workflow"

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: ${COMPOSE_PROJECT_NAME}-anythingllm
    restart: unless-stopped
    environment:
      STORAGE_DIR: /app/server/storage
      JWT_SECRET: ${ANYTHINGLLM_JWT_SECRET}
      LLM_PROVIDER: ollama
      OLLAMA_BASE_PATH: http://ollama:11434
      EMBEDDING_ENGINE: ollama
      EMBEDDING_BASE_PATH: http://ollama:11434
      VECTOR_DB: qdrant
      QDRANT_ENDPOINT: http://qdrant:6333
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/anythingllm:/app/server/storage
      - ${DATA_ROOT}/documents:/app/server/storage/documents
      - ${DATA_ROOT}/logs/anythingllm:/var/log/anythingllm
    networks:
      - net_internal
      - net_default
    ports:
      - "${ANYTHINGLLM_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=anythingllm"
      - "ai-platform.type=ai-platform"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ${COMPOSE_PROJECT_NAME}-openwebui
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${JWT_SECRET}
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
      VECTOR_DB: ${VECTOR_DB_TYPE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      COLLECTION_NAME: ${COMPOSE_PROJECT_NAME}
    volumes:
      - ${DATA_ROOT}/open-webui:/app/backend/data
      - ${DATA_ROOT}/logs/open-webui:/app/logs
    networks:
      - net_internal
      - net_default
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "ai-platform.service=open-webui"
      - "ai-platform.type=ui"

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME}-prometheus
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT}/prometheus:/prometheus
      - ${DATA_ROOT}/config/prometheus:/etc/prometheus
      - ${DATA_ROOT}/logs/prometheus:/var/log/prometheus
    networks:
      - net_internal
    ports:
      - "${PROMETHEUS_PORT:-5000}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=prometheus"
      - "ai-platform.type=monitoring"

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME}-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/grafana:/var/lib/grafana
      - ${DATA_ROOT}/logs/grafana:/var/log/grafana
    networks:
      - net_internal
      - net_default
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=grafana"
      - "ai-platform.type=monitoring"

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    platform: linux/amd64
    container_name: ${COMPOSE_PROJECT_NAME}-signal-api
    restart: unless-stopped
    environment:
      MODE: json
      PORT: ${SIGNAL_PORT:-8085}
      SIGNAL_CLI_REST_API_PUBLIC_URL: https://signal.${DOMAIN_NAME}
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - net_internal
    ports:
      - "${SIGNAL_PORT:-8085}:${SIGNAL_PORT:-8085}"
    profiles:
      - signal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${SIGNAL_PORT:-8085}/v1/about || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  openclaw:
    image: alpine/openclaw:latest
    container_name: ${COMPOSE_PROJECT_NAME}-openclaw
    restart: unless-stopped
    environment:
      OPENCLAW_ADMIN_USER: ${OPENCLAW_ADMIN_USER:-admin}
      OPENCLAW_ADMIN_PASSWORD: ${OPENCLAW_ADMIN_PASSWORD}
      OPENCLAW_PORT: ${OPENCLAW_PORT:-18789}
      OPENCLAW_ENABLE_SIGNAL: ${OPENCLAW_ENABLE_SIGNAL:-true}
      OPENCLAW_ENABLE_LITELM: ${OPENCLAW_ENABLE_LITELM:-true}
      OPENCLAW_ENABLE_N8N: ${OPENCLAW_ENABLE_N8N:-true}
      PUID: ${TENANT_UID}
      PGID: ${TENANT_GID}
      TZ: ${TIMEZONE:-UTC}
      VECTOR_DB: ${VECTOR_DB_TYPE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ${DATA_ROOT}/openclaw:/app/data
      - ${DATA_ROOT}/logs/openclaw:/var/log/openclaw
    networks:
      - net_internal
      - net_default
    ports:
      - "${OPENCLAW_PORT:-18789}:8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=openclaw"
      - "ai-platform.type=orchestration"

  tailscale:
    image: tailscale/tailscale:latest
    container_name: ${COMPOSE_PROJECT_NAME}-tailscale
    restart: unless-stopped
    environment:
      TS_USERSPACE: ${TAILSCALE_USERSPACE:-ai-platform}
      TS_EXTRA_ARGS: ${TAILSCALE_EXTRA_ARGS}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - ${DATA_ROOT}/tailscale:/var/lib/tailscale
      - ${DATA_ROOT}/logs/tailscale:/var/log/tailscale
    networks:
      - net_internal
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai-platform.service=tailscale"
      - "ai-platform.type=networking"

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME}-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
      - ${DATA_ROOT}/logs/minio:/var/log/minio
    networks:
      - net_internal
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${COMPOSE_PROJECT_NAME}-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
      - ${DATA_ROOT}/logs/qdrant:/var/log/qdrant
    networks:
      - net_internal
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  rclone:
    image: rclone/rclone:latest
    container_name: ${COMPOSE_PROJECT_NAME}-rclone
    restart: unless-stopped
    volumes:
      - ${TENANT_DIR}/config/rclone:/config/rclone
      - ${RCLONE_MOUNT_POINT:-/mnt/data/rclone}:/data:shared
    networks:
      - net_default
    environment:
      - RCLONE_CONFIG=/config/rclone/rclone.conf
      - RCLONE_CACHE_DIR=/cache
    command: mount gdrive:/data --cache-dir /cache --vfs-cache-mode full

  caddy:
    image: caddy:2-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DATA_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${DATA_ROOT}/caddy/data:/data
      - ${DATA_ROOT}/cache:/cache
    networks:
      - net_default
      - net_internal
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - SSL_EMAIL=${SSL_EMAIL}
    labels:
      - "ai-platform.service=caddy"
      - "ai-platform.type=reverse-proxy"

